apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rankore-transcripts
  namespace: rankore
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path-ssd
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rankore
  namespace: rankore
  labels:
    app.kubernetes.io/name: rankore
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: rankore
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rankore
    spec:
      # Uncomment if the GHCR image is private:
      # imagePullSecrets:
      #   - name: ghcr-pull
      containers:
        - name: rankore
          image: ghcr.io/fulviodenza/rankore:latest
          imagePullPolicy: Always
          env:
            - name: DISCORD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: rankore-bot
                  key: DISCORD_TOKEN
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: rankore-postgres
                  key: DATABASE_URL
            - name: WHISPER_URL
              value: "http://whisper:8000"
            - name: TRANSCRIPTS_DIR
              value: "/transcripts"
            - name: RUST_BACKTRACE
              value: "1"
          volumeMounts:
            - name: transcripts
              mountPath: /transcripts
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: transcripts
          persistentVolumeClaim:
            claimName: rankore-transcripts
      restartPolicy: Always
      terminationGracePeriodSeconds: 15
